services:
  - type: web
    name: rt-prj
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && cd myproject && python manage.py collectstatic --no-input && python manage.py migrate
    startCommand: cd myproject && gunicorn myproject.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://*.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: rt-prj-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: "gpt-4o"
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: rt-prj-db
    databaseName: rtprj
    user: rtprj
    plan: free
    region: oregon
